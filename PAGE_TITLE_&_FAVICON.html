<!-- HTML Favicon
webserver, or create a folder in the root directory called images, and save your favicon image in this folder. A common name for a favicon image is "favicon.ico".
Next, add a <link> element to your "index.html" file, after the <title> element, like this:
Example -->
<!DOCTYPE html>
<html>
<head>
  <title>My Page Title</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
</head>
<body>

<h1>This is a Heading</h1>
<p>This is a paragraph.</p>

</body>
</html>
<!-- Now, save the "index.html" file and reload it in your browser. Your browser tab should now display your favicon image to the left of the page title. -->



<!-- HTML Page Title
Every web page should have a page title to describe the meaning of the page. -->

<!-- The Title Element
The <title> element adds a title to your page: -->

<!-- Example -->
<!DOCTYPE html>
<html>
<head>
  <title>HTML Tutorial</title>
</head>
<body>
</body>
</html>
<!-- The title is shown in the browser's title bar: -->

</body>
</html>
